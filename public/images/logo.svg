<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14" />
      <stop offset="50%" stop-color="#120c24" />
      <stop offset="100%" stop-color="#07070a" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <rect width="500" height="500" rx="100" fill="url(#bgGrad)" />
  <rect x="15" y="15" width="470" height="470" rx="85" fill="none" stroke="url(#logoGrad)" stroke-width="4" opacity="0.6" />

  <!-- Minecraft Sword & Crown Emblem -->
  <g filter="url(#glow)">
    <!-- Hexagon Outer Ring -->
    <polygon points="250,50 410,140 410,360 250,450 90,360 90,140" fill="none" stroke="url(#logoGrad)" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Inner Minecraft Sword / Diamond Icon -->
    <path d="M250,110 L350,210 L300,260 L250,210 L200,260 L150,210 Z" fill="url(#logoGrad)" opacity="0.9" />
    <path d="M250,210 L250,380" stroke="url(#logoGrad)" stroke-width="24" stroke-linecap="round" />
    <circle cx="250" cy="390" r="22" fill="#ec4899" />
  </g>

  <!-- Text Overlay: DarNed -->
  <text x="250" y="440" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="52" fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">
    DARned
  </text>
</svg>
